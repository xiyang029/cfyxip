name: Proxy Auto Checker

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: proxy-auto-checker
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 语法检查
        run: node --check verify_proxies.js

      - name: 执行检测
        run: node verify_proxies.js

      - name: 提交结果
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add cfyxip.txt valid_proxies.txt 2>/dev/null || git add cfyxip.txt

          if git diff --cached --quiet; then
            echo "没有检测到结果变化，跳过提交。"
          else
            git commit -m "自动更新代理结果: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
