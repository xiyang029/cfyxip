name: Proxy Auto Checker

on:
  schedule:
    - cron: '0 */1 * * *' # 每1小时运行一次
  workflow_dispatch:      # 允许手动运行

# 强制使用最新的 Node.js 运行环境以消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 必须开启写入权限

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true # 关键：确保 Git 凭据持久化用于 Push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests PySocks

      - name: Run Verification
        run: python verify_proxies.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查文件是否存在并添加
          git add valid_proxies.txt valid_proxies.json || echo "文件不存在，跳过"
          
          # 检查暂存区是否有变化
          if git diff --staged --quiet; then
            echo "没有发现代理变化，跳过更新。"
          else
            git commit -m "自动更新可用代理列表: $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin HEAD
          fi
